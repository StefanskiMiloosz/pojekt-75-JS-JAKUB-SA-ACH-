<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>JS sprawdzeinie</title>
    <script type="text/javascript">
        function sprawdz() {
            let liczba = document.getElementById("pole").value;
            if (liczba == "") document.getElementById("wynik").innerHTML = "Nie wprowadzono nic";
            else if (liczba > 0) document.getElementById("wynik").innerHTML = "Liczba jest dodatnia";
            else if (liczba < 0) document.getElementById("wynik").innerHTML = "Liczba jest ujemna";
            else if(liczba==0) document.getElementById("wynik").innerHTML = "Liczba jest równa zero";
            else document.getElementById("wynik").innerHTML = "Nie wprowadzono liczby";
            

        }

            

    </script>
</head>
<body>
    <input type="text" id="pole">
    <input type="submit" id="submit" value="Sprawdź" onclick="sprawdz()">
    <div id="wynik"></div>
    
        
</body>
</html>
